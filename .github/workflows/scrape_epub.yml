name: Build Dorar EPUB

on:
  workflow_dispatch:          # تشغيل يدوي من GitHub UI
    inputs:
      test_pages:
        description: 'عدد صفحات للاختبار (اتركه فارغاً للكامل)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # ساعتان — كافية للموسوعة كاملة

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ebooklib lxml

      - name: Run scraper
        env:
          TEST_PAGES: ${{ github.event.inputs.test_pages }}
        run: python scraper.py          # غيّر الاسم إن كان مختلفاً

      - name: Commit EPUB to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dorar_qfiqhia/موسوعة_القواعد_الفقهية.epub
          git diff --staged --quiet || git commit -m "update: EPUB $(date +'%Y-%m-%d')"
          git push