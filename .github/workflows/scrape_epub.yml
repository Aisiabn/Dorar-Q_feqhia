name: Build Dorar EPUB

on:
  workflow_dispatch:          # تشغيل يدوي من GitHub UI
    inputs:
      test_pages:
        description: 'عدد صفحات للاختبار (اتركه فارغاً للكامل)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # ساعتان — كافية للموسوعة كاملة

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ebooklib lxml

      - name: Run scraper
        env:
          TEST_PAGES: ${{ github.event.inputs.test_pages }}
        run: python scraper.py          # غيّر الاسم إن كان مختلفاً

      - name: Upload EPUB
        uses: actions/upload-artifact@v4
        with:
          name: موسوعة_القواعد_الفقهية
          path: dorar_qfiqhia/موسوعة_القواعد_الفقهية.epub
          retention-days: 30