name: Scrape Dorar Qfiqhia

on:
  workflow_dispatch:
    inputs:
      test_pages:
        description: "عدد الصفحات للاختبار (اتركه فارغاً للتحميل الكامل)"
        required: false
        default: ""
      output:
        description: "نوع المخرج"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - epub
          - md

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: إعداد Git LFS
        run: |
          git lfs install
          git lfs track "*.epub"
          git add .gitattributes || true

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: تثبيت المكتبات
        run: pip install requests beautifulsoup4 lxml ebooklib

      - name: تشغيل EPUB
        if: ${{ github.event.inputs.output == 'epub' || github.event.inputs.output == 'both' }}
        env:
          TEST_PAGES: ${{ github.event.inputs.test_pages }}
        run: python scraper_epub.py

      - name: تشغيل Markdown
        if: ${{ github.event.inputs.output == 'md' || github.event.inputs.output == 'both' }}
        env:
          TEST_PAGES: ${{ github.event.inputs.test_pages }}
        run: python scraper_md.py

      - name: إحصاء الملفات
        run: |
          echo "ملفات MD:   $(ls dorar_qfiqhia/*.md  2>/dev/null | wc -l)"
          echo "ملفات EPUB: $(ls dorar_qfiqhia/*.epub 2>/dev/null | wc -l)"
          echo "الحجم الكلي: $(du -sh dorar_qfiqhia/ 2>/dev/null | cut -f1)"

      - name: حفظ الملفات في الـ repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dorar_qfiqhia/
          git diff --cached --quiet && echo "لا يوجد تغيير" && exit 0
          git commit -m "scrape: تحديث موسوعة القواعد الفقهية [run #${{ github.run_number }}]"
          git push